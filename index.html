<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Species Explorer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <h1>🌍 Global Species Explorer</h1>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search species, traits, behavior..." />

    <div class="filters">
      <button class="filter-btn active" data-category="All">All</button>
      <button class="filter-btn" data-category="Animalia">Animals</button>
      <button class="filter-btn" data-category="Plantae">Plants</button>
      <button class="filter-btn" data-category="Fungi">Fungi</button>
    </div>

    <select id="socialFilter">
      <option value="All">All Social Structures</option>
      <option value="Matriarchal">Matriarchal</option>
      <option value="Solitary">Solitary</option>
      <option value="Colonial">Colonial</option>
    </select>
  </div>
</header>

<main>
  <div id="speciesGrid" class="grid"></div>
  <button id="loadMore">Load More</button>
</main>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <span id="closeModal">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
